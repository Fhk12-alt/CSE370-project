<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Features Section</title>
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheet -->
    <link rel="stylesheet" href="stylehome1.css" />
  </head>
  <body>
    <section>
      <div class="row">
        <h1>Admin Panel</h1>
      </div>
      <div class="row">
        <!-- Column One -->
        <div class="column">
          <div class="card">
            <div class="icon">
              <i class="fa-solid fa-user"></i>
            </div>
            <button type="button" onclick="location.href='formadmin1.html';"><h3>Update Employee Information</h3></button>
            <p>
              add employe ,delete  their data  , allocate raise or do deductions.
            </p>
          </div>
        </div>
        <!-- Column Two -->
        <div class="column">
          <div class="card">
            <div class="icon">
              <i class="fa-solid fa-shield-halved"></i>
            </div>
            <button type="button" onclick="location.href='formadmin3.html';"><h3>Request hub</h3></button>
            <p>
              Requests from employees on certain problems
            </p>
          </div>
        </div>
        <!-- Column Three -->
        <div class="column">
          <div class="card">
            <div class="icon">
              <i class="fa-solid fa-headset"></i>
            </div>
            <button type="button" onclick="location.href='formadmin2.html';"><h3>Employee Database</h3></button>
            <p>
              Check the data base to collect information on Employees
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
