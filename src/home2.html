<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Features Section</title>
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheet -->
    <link rel="stylesheet" href="stylehome1.css" />
  </head>
  <body>
    <section>
      <div class="row">
        <h1>Employee Panel</h1>
      </div>
      <div class="row">
        <!-- Column One -->
        <div class="column">
          <div class="card">
            <div class="icon">
              <i class="fa-solid fa-user"></i>
            </div>
            <button type="button" onclick="location.href='index.html';"><h3>Payslip Download</h3></button>
            <p>
             Click here to download your payslip
            </p>
          </div>
        </div>
        <!-- Column Two -->
        <div class="column">
          <div class="card">
            <div class="icon">
              <i class="fa-solid fa-shield-halved"></i>
            </div>
            <button type="button" onclick="location.href='index.html';"><h3>Progress Section</h3></button>
            <p>
               Check out how much progress you have made this week
            </p>
          </div>
        </div>
        <!-- Column Three -->
        <div class="column">
          <div class="card">
            <div class="icon">
              <i class="fa-solid fa-headset"></i>
            </div>
            <button type="button" onclick="location.href='formemp_request.html';"><h3>Request Tab</h3></button>

            <p>
              Wrong information on payslip ? Request the admins to check
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
